services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: just_agentic
      POSTGRES_USER: just_agentic
      POSTGRES_PASSWORD: just_agentic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U just_agentic -d just_agentic"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://just_agentic:just_agentic@postgres:5432/just_agentic
      # CORS_ORIGINS: http://localhost:3000,https://yourdomain.com
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Docker internal: frontend → api service; override for external deployments
        NEXT_PUBLIC_API_URL: "http://api:8000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
